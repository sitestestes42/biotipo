<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="style.css">
  <style>
    /* Garantir que a imagem no resultado fique redonda e com borda */
    .resultado__image {
      width: 180px;
      height: 180px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--primary);
      box-shadow: 0 0 30px rgba(248, 94, 58, 0.5);
      background: var(--bg-card);
    }
    .resultado__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Ajuste para SVG se não usar imagem */
    .resultado__image svg {
      width: 100%;
      height: 100%;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo"><i class="fa-solid fa-dumbbell"></i> BioType</a>

    </nav>
  </header>

  <main class="page-container">
    <section class="resultado section">
      <div class="container">
        <div id="resultado-content">
          <!-- Conteúdo preenchido pelo JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">

  </footer>
  <script src="script.js"></script>
