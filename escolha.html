<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha seu Biotipo | BioType</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Grid dos wrappers */
    .biotype-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin-bottom: 2.5rem;
    }

    .biotype-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .biotype-card {
      width: 100%;
      max-width: 350px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .biotype-card:hover {
      transform: scale(1.02);
      box-shadow: 0 16px 50px rgba(255, 107, 53, 0.2);
      border-color: rgba(255, 107, 53, 0.6);
    }

    .biotype-card img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      aspect-ratio: 3/4; /* proporção retrato, ajustável */
    }

    .biotype-wrapper h3 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 2px;
      margin: 0;
      text-transform: uppercase;
    }

    .biotype-wrapper .btn {
      padding: 12px 40px;
      background: #ff6b35;
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      transition: background 0.3s, transform 0.2s;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .biotype-wrapper .btn:hover {
      background: #e85a2a;
      transform: translateY(-2px);
    }

    /* Botão "Não sabe?" */
    .quiz-link {
      text-align: center;
      margin-top: 1rem;
    }

    .quiz-link .btn-outline {
      background: transparent;
      border: 2px solid #6c2bd9;
      color: #ffffff;
      padding: 12px 30px;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
    }

    .quiz-link .btn-outline:hover {
      background: #6c2bd9;
      border-color: #6c2bd9;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(108, 43, 217, 0.3);
    }

    /* Responsivo */
    @media (max-width: 900px) {
      .biotype-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }
    }

    @media (max-width: 600px) {
      .biotype-grid {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .biotype-card {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo"><i class="fa-solid fa-dumbbell"></i> BioType</a>
      <ul class="nav__list">
        <li><a href="index.html" class="nav__link">Início</a></li>
        <li><a href="escolha.html" class="nav__link active">Escolher Biotipo</a></li>
        <li><a href="questionario.html" class="nav__link">Fazer Teste</a></li>
      </ul>
      <button class="nav__toggle" aria-label="Abrir menu"><i class="fa-solid fa-bars"></i></button>
    </nav>
  </header>

  <main class="page-container">
    <section class="escolha section">
      <div class="container">
        <h1 class="section__title fade-in-up">ESCOLHA SEU <span class="text-gradient">BIOTIPO</span></h1>
        <p class="section__subtitle fade-in-up delay-1">Selecione o corpo que mais se parece com o seu</p>

        <div class="biotype-grid fade-in-up delay-2">
          <!-- Ectomorfo -->
          <div class="biotype-wrapper">
            <div class="biotype-card">
              <img src="assets/ectomorfo.png" alt="Ectomorfo">
            </div>
            <h3>ECTOMORFO</h3>
            <a href="resultado.html?biotipo=ectomorfo" class="btn">ESCOLHER</a>
          </div>

          <!-- Mesomorfo -->
          <div class="biotype-wrapper">
            <div class="biotype-card">
              <img src="assets/mesomorfo.png" alt="Mesomorfo">
            </div>
            <h3>MESOMORFO</h3>
            <a href="resultado.html?biotipo=mesomorfo" class="btn">ESCOLHER</a>
          </div>

          <!-- Endomorfo -->
          <div class="biotype-wrapper">
            <div class="biotype-card">
              <img src="assets/endomorfo.png" alt="Endomorfo">
            </div>
            <h3>ENDOMORFO</h3>
            <a href="resultado.html?biotipo=endomorfo" class="btn">ESCOLHER</a>
          </div>
        </div>

        <div class="quiz-link fade-in-up delay-3">
          <a href="questionario.html" class="btn-outline">
            <i class="fa-solid fa-circle-question"></i> NÃO SABE? FAÇA O TESTE!
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__bottom"><p>&copy; 2024 BioType. Todos os direitos reservados.</p></div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
