<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha seu Biotipo | BioType</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo"><i class="fa-solid fa-dumbbell"></i> BioType</a>
      <ul class="nav__list">
        <li><a href="index.html" class="nav__link">Início</a></li>
        <li><a href="escolha.html" class="nav__link active">Escolher Biotipo</a></li>
        <li><a href="questionario.html" class="nav__link">Fazer Teste</a></li>
      </ul>
      <button class="nav__toggle" aria-label="Abrir menu"><i class="fa-solid fa-bars"></i></button>
    </nav>
  </header>

  <main class="page-container">
    <section class="escolha section">
      <div class="container">
        <h1 class="section__title fade-in-up">ESCOLHA SEU <span class="text-gradient">BIOTIPO</span></h1>
        <p class="section__subtitle fade-in-up delay-1">Selecione o corpo que mais se parece com o seu</p>

        <div class="biotype-grid fade-in-up delay-2">
          <!-- Ectomorfo -->
          <div class="biotype-wrapper">
            <div class="biotype-card">
              <img src="assets/ectomorfo.png" alt="Ectomorfo">
            </div>
            <h3>ECTOMORFO</h3>
            <a href="resultado.html?biotipo=ectomorfo" class="btn btn--primary">ESCOLHER</a>
          </div>

          <!-- Mesomorfo -->
          <div class="biotype-wrapper">
            <div class="biotype-card">
              <img src="assets/mesomorfo.png" alt="Mesomorfo">
            </div>
            <h3>MESOMORFO</h3>
            <a href="resultado.html?biotipo=mesomorfo" class="btn btn--primary">ESCOLHER</a>
          </div>

          <!-- Endomorfo -->
          <div class="biotype-wrapper">
            <div class="biotype-card">
              <img src="assets/endomorfo.png" alt="Endomorfo">
            </div>
            <h3>ENDOMORFO</h3>
            <a href="resultado.html?biotipo=endomorfo" class="btn btn--primary">ESCOLHER</a>
          </div>
        </div>

        <div class="text-center fade-in-up delay-3">
          <a href="questionario.html" class="btn btn--secondary">
            <i class="fa-solid fa-circle-question"></i> NÃO SABE? FAÇA O TESTE!
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__bottom"><p>&copy; 2024 BioType. Todos os direitos reservados.</p></div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
